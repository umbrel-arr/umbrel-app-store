version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrel-arr-privado-vpn_server_1
      APP_PORT: 8080
  server:
    image: ghcr.io/umbrel-arr/privado-proxy:1.2.4@sha256:4ae28b669de7c95ecf5bb9e849e4f2f8b5e55b710027550b0504de2e3bbf7d12
    restart: on-failure
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: ${TZ:-Etc/UTC}
      SOCK_PORT: "1080"
      DASHBOARD_ENABLED: "true"
      DASHBOARD_PORT: "8080"
      PRIVADO_USERNAME: ""
      PRIVADO_PASSWORD: ""
      PRIVADO_SERVER: ""
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
