version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrel-arr-privado-vpn_server_1
      APP_PORT: 8080
  server:
    image: ghcr.io/umbrel-arr/privado-proxy:1.2.2@sha256:68dd6eb5d8355105dc913f59d02dd759ec4be4ae75a625032c9fc28264921eb2
    restart: on-failure
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: ${TZ:-Etc/UTC}
      SOCK_PORT: "1080"
      DASHBOARD_ENABLED: "true"
      DASHBOARD_PORT: "8080"
      PRIVADO_USERNAME: ""
      PRIVADO_PASSWORD: ""
      PRIVADO_SERVER: ""
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
