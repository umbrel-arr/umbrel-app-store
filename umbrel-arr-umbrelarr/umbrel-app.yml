manifestVersion: 1
id: umbrel-arr-umbrelarr
category: Media
name: umbrelarr
version: "1.1.0"
tagline: Connect and manage your installed Umbrel Arr apps
icon: https://raw.githubusercontent.com/umbrel-arr/umbrel-app-store/main/umbrel-arr-umbrelarr/icon.svg
description: >-
  umbrelarr is the management surface for Umbrel Arr. Install its required apps from the store first, then use the explicit setup step to detect and connect them before any managed configuration begins.
releaseNotes: >-
  Adds explicit setup and a stateless API-only runtime. Before installing 1.1, update Prowlarr, qBittorrent, SABnzbd, both Sonarr and Radarr packages, Bazarr, Overseerr, and Lidarr to their .3 handoff revisions.
developer: Umbrel Arr
