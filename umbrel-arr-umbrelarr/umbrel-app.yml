manifestVersion: 1
id: umbrel-arr-umbrelarr
category: Media
name: umbrelarr
version: "1.0.3"
tagline: Manage and automatically configure the complete stack
icon: icon.svg
description: >-
  umbrelarr is the management surface for Umbrel Arr. It installs the service dependencies, accepts the one-time Privado login, configures all owned integrations, reports required actions, and repairs managed drift without touching user-owned settings.
releaseNotes: >-
  Initial Umbrel Arr package. Cross-service configuration is owned by
  umbrelarr and internal credentials are generated at install time.
developer: Umbrel Arr
website: https://github.com/umbrel-arr/umbrelarr
dependencies:
  - umbrel-arr-privado-vpn
  - umbrel-arr-flaresolverr
  - umbrel-arr-prowlarr
  - umbrel-arr-qbittorrent
  - umbrel-arr-sabnzbd
  - umbrel-arr-sonarr
  - umbrel-arr-sonarr-4k
  - umbrel-arr-radarr
  - umbrel-arr-radarr-4k
  - umbrel-arr-bazarr
  - umbrel-arr-overseerr
  - umbrel-arr-profilarr
  - umbrel-arr-lidarr
permissions:
  - STORAGE_DOWNLOADS
repo: https://github.com/umbrel-arr/umbrelarr
support: https://github.com/umbrel-arr/umbrelarr/issues
