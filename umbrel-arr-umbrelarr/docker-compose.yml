version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrel-arr-umbrelarr_server_1
      APP_PORT: 8080
  server:
    image: ghcr.io/umbrel-arr/umbrelarr:1.4.1@sha256:7fe92aa8a34bfa85913ca128487f040f920868ad7322590254991b6de76abff2
    restart: on-failure
    read_only: true
    environment:
      TZ: ${TZ:-Etc/UTC}
      DEVICE_DOMAIN_NAME: ${DEVICE_DOMAIN_NAME:-umbrel.local}
      UMBREL_ARR_MANAGED_CONFIG_DIR: /managed-config
      UMBREL_ARR_DOCKER_BROKER_URL: http://docker_inventory:8765
      UMBREL_ARR_DOCKER_BROKER_TOKEN: ${UMBREL_ARR_DOCKER_BROKER_TOKEN:?missing Docker broker token}
      RECONCILE_INTERVAL: "300"
      UMBREL_ARR_PRIVADO_VPN_URL: ${UMBREL_ARR_PRIVADO_VPN_URL:-http://umbrel-arr-privado-vpn_server_1:8080}
      UMBREL_ARR_FLARESOLVERR_URL: ${UMBREL_ARR_FLARESOLVERR_URL:-http://umbrel-arr-flaresolverr_server_1:8191}
      UMBREL_ARR_PROWLARR_URL: ${UMBREL_ARR_PROWLARR_URL:-http://umbrel-arr-prowlarr_server_1:9696}
      UMBREL_ARR_QBITTORRENT_URL: ${UMBREL_ARR_QBITTORRENT_URL:-http://umbrel-arr-qbittorrent_server_1:8080}
      UMBREL_ARR_SABNZBD_URL: ${UMBREL_ARR_SABNZBD_URL:-http://umbrel-arr-sabnzbd_server_1:8080}
      UMBREL_ARR_SONARR_URL: ${UMBREL_ARR_SONARR_URL:-http://umbrel-arr-sonarr_server_1:8989}
      UMBREL_ARR_SONARR_4K_URL: ${UMBREL_ARR_SONARR_4K_URL:-http://umbrel-arr-sonarr-4k_server_1:8989}
      UMBREL_ARR_RADARR_URL: ${UMBREL_ARR_RADARR_URL:-http://umbrel-arr-radarr_server_1:7878}
      UMBREL_ARR_RADARR_4K_URL: ${UMBREL_ARR_RADARR_4K_URL:-http://umbrel-arr-radarr-4k_server_1:7878}
      UMBREL_ARR_BAZARR_URL: ${UMBREL_ARR_BAZARR_URL:-http://umbrel-arr-bazarr_server_1:6767}
      UMBREL_ARR_OVERSEERR_URL: ${UMBREL_ARR_OVERSEERR_URL:-http://umbrel-arr-overseerr_server_1:5055}
      UMBREL_ARR_PROFILARR_URL: ${UMBREL_ARR_PROFILARR_URL:-http://umbrel-arr-profilarr_server_1:6868}
      UMBREL_ARR_LIDARR_URL: ${UMBREL_ARR_LIDARR_URL:-http://umbrel-arr-lidarr_server_1:8686}
      UMBREL_ARR_JELLYFIN_URL: ${UMBREL_ARR_JELLYFIN_URL:-http://jellyfin_server_1:8096}
      UMBREL_ARR_PLEX_URL: http://${DEVICE_DOMAIN_NAME:-umbrel.local}:32400
      UMBREL_ARR_QBITTORRENT_USERNAME: ${UMBREL_ARR_QBITTORRENT_USERNAME:-admin}
      UMBREL_ARR_QBITTORRENT_PASSWORD: ${UMBREL_ARR_QBITTORRENT_PASSWORD:-}
      UMBREL_ARR_PRIVADO_SOCKS_HOST: ${UMBREL_ARR_PRIVADO_SOCKS_HOST:-umbrel-arr-privado-vpn_server_1}
      UMBREL_ARR_PRIVADO_SOCKS_PORT: ${UMBREL_ARR_PRIVADO_SOCKS_PORT:-1080}
      UMBREL_ARR_SOCKS5_HOST: ${UMBREL_ARR_SOCKS5_HOST:-}
      UMBREL_ARR_SOCKS5_PORT: ${UMBREL_ARR_SOCKS5_PORT:-1080}
    volumes:
      - ${UMBREL_ARR_PROWLARR_CONFIG_DIR:-/dev/null}:/managed-config/prowlarr:ro
      - ${UMBREL_ARR_SABNZBD_CONFIG_DIR:-/dev/null}:/managed-config/sabnzbd:ro
      - ${UMBREL_ARR_SONARR_CONFIG_DIR:-/dev/null}:/managed-config/sonarr:ro
      - ${UMBREL_ARR_SONARR_4K_CONFIG_DIR:-/dev/null}:/managed-config/sonarr-4k:ro
      - ${UMBREL_ARR_RADARR_CONFIG_DIR:-/dev/null}:/managed-config/radarr:ro
      - ${UMBREL_ARR_RADARR_4K_CONFIG_DIR:-/dev/null}:/managed-config/radarr-4k:ro
      - ${UMBREL_ARR_BAZARR_CONFIG_DIR:-/dev/null}:/managed-config/bazarr:ro
      - ${UMBREL_ARR_OVERSEERR_CONFIG_DIR:-/dev/null}:/managed-config/overseerr:ro
      - ${UMBREL_ARR_LIDARR_CONFIG_DIR:-/dev/null}:/managed-config/lidarr:ro
      - ${UMBREL_ARR_JELLYFIN_CONFIG_DIR:-/dev/null}:/managed-config/jellyfin:ro
      - ${UMBREL_ARR_PLEX_CONFIG_DIR:-/dev/null}:/managed-config/plex:ro
    depends_on:
      docker_inventory:
        condition: service_healthy

  docker_inventory:
    image: ghcr.io/umbrel-arr/umbrelarr:1.4.1@sha256:7fe92aa8a34bfa85913ca128487f040f920868ad7322590254991b6de76abff2
    restart: on-failure
    read_only: true
    user: "0:0"
    command: ["python3", "/app/docker_inventory.py"]
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      DOCKER_INVENTORY_HOST: 0.0.0.0
      DOCKER_INVENTORY_PORT: "8765"
      DOCKER_INVENTORY_TOKEN: ${UMBREL_ARR_DOCKER_BROKER_TOKEN:?missing Docker broker token}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
