name: Validate store

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: .tools/generate-packages.py --check
      - run: .tools/validate-store.sh
      - run: python -m unittest discover -s .src/setup/tests -v
      - run: python -m compileall -q .src/setup
