name: Validate store

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: .tools/generate-packages.py --check
      - run: .tools/validate-store.sh
      - run: python -m unittest discover -s .tools/tests -v
      - run: python -m compileall -q .tools
      - run: bash -n .tools/linux-integration-smoke.sh
