name: Smoke stack on Linux

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Run isolated stack smoke test
        env:
          UMBREL_ARR_LINUX_INTEGRATION: "1"
        run: .tools/linux-integration-smoke.sh
