name: Smoke stack on Linux

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privado-process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Verify Privado supervisor lifecycle
        env:
          UMBREL_ARR_LINUX_INTEGRATION: "1"
        run: .tools/privado-process-smoke.sh

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile:
          - core-direct
          - tv-torrent-privado
          - tv-torrent-generic-socks5
          - video-usenet-direct
          - full-privado
    steps:
      - uses: actions/checkout@v5
      - name: Run isolated ${{ matrix.profile }} smoke test
        env:
          UMBREL_ARR_LINUX_INTEGRATION: "1"
          UMBREL_ARR_SMOKE_PROFILE: ${{ matrix.profile }}
        run: .tools/linux-integration-smoke.sh
