version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrel-arr-profilarr_server_1
      APP_PORT: 6868
  server:
    image: ghcr.io/dictionarry-hub/profilarr:2.0.9@sha256:7a9b5112ff227320d17c65ab643a5d875713e6235991ef04a8e482ec51427902
    restart: on-failure
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      AUTH: "off"
      PARSER_HOST: parser
      PARSER_PORT: "5000"
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    depends_on:
      parser:
        condition: service_healthy

  parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:2.0.9@sha256:16b22ef6485e135cc660cd511697c637d44649753d02397c9374e1317cfaaf0e
    restart: on-failure
